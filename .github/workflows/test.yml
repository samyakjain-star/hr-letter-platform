name: Tests

# Runs the security + unit test suite on every push and PR. The security tests
# are tripwires: if a change weakens network isolation, the Electron sandbox,
# or at-rest encryption, this job fails and blocks the merge.

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm test
